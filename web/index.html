<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HeartShare" />
    <title>HeartShare</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/heart-icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell" aria-live="polite">
      <section class="glass-panel">
        <p class="eyebrow">HeartShare</p>

        <div class="heart-wrap" aria-hidden="true">
          <div id="heart" class="heart"></div>
        </div>

        <div class="bpm-block">
          <div id="bpmValue" class="bpm-value">Waiting...</div>
          <div class="bpm-label">bpm</div>
        </div>

        <div id="statusPill" class="status-pill waiting">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">Waiting...</span>
        </div>

        <div class="updated">
          <span>心拍データ</span>
          <strong id="sampleAt">未受信</strong>
        </div>

        <div class="chart-panel">
          <div class="chart-head">
            <span>48時間ログ</span>
            <strong id="chartRange">履歴待ち</strong>
          </div>
          <div class="chart-body">
            <div class="chart-axis" aria-hidden="true">
              <span id="axisMax">120 bpm</span>
              <span id="axisMid">90 bpm</span>
              <span id="axisMin">60 bpm</span>
            </div>
            <div id="chartScroller" class="chart-scroller">
              <canvas id="historyChart" width="2200" height="320"></canvas>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
